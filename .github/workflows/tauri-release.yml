name: tauri-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./apps/desktop/src-tauri -> target"

      - name: Install npm deps
        run: npm install --legacy-peer-deps

      - name: Build & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "work-tracker ${{ github.ref_name }}"
          releaseBody: |
            macOS (Apple Silicon / M-series) build of work-tracker.

            The app wraps the deployed web UI and unlocks native capabilities (gh CLI commits, sysinfo, system tray, autostart). Unsigned build — on first launch, right-click → Open to bypass Gatekeeper.
          releaseDraft: false
          prerelease: false
          args: "--target aarch64-apple-darwin"
