name: tauri-release

# The org disables write permissions for the workflow GITHUB_TOKEN, so CI
# cannot create GitHub Releases directly. Instead we BUILD the macOS (Apple
# Silicon) bundle and upload it as a workflow artifact; the release is then
# published with a user token (`gh release create`) — see README/release docs.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./apps/desktop/src-tauri -> target"

      - name: Install npm deps
        run: npm install --legacy-peer-deps

      - name: Build app bundle
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: ./apps/desktop
          args: "--target aarch64-apple-darwin"

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: work-tracker-macos-arm64
          if-no-files-found: error
          path: |
            apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
            apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
